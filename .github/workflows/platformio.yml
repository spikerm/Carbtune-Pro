name: PlatformIO

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build display firmware
        run: pio run -e display

      - name: Build SensorNode firmware
        run: pio run -e sensornode

      - name: Prepare firmware artifacts
        run: |
          echo "Available PlatformIO binaries:"
          find .pio/build -maxdepth 3 -type f -name '*.bin' -print | sort
          python - <<'PY'
          from datetime import datetime, timezone
          from pathlib import Path
          import os
          import re
          import shutil

          root = Path.cwd()
          out = root / "firmware-artifacts"
          out.mkdir(exist_ok=True)

          def firmware_for(environment):
              env_dir = root / ".pio" / "build" / environment
              preferred = env_dir / "firmware.bin"
              if preferred.exists():
                  return preferred
              matches = sorted(
                  path for path in env_dir.glob("*.bin")
                  if path.name not in {"bootloader.bin", "partitions.bin"}
              )
              if matches:
                  return matches[0]
              all_bins = "\n".join(str(path) for path in sorted((root / ".pio" / "build").glob("**/*.bin")))
              raise FileNotFoundError(f"Missing firmware binary for {environment}. Available bins:\n{all_bins}")

          shutil.copyfile(firmware_for("display"), out / "display-firmware.bin")
          shutil.copyfile(firmware_for("sensornode"), out / "sensornode-firmware.bin")

          version_text = (root / "Display" / "include" / "version.h").read_text(encoding="utf-8")
          match = re.search(r'#define\s+FW_VERSION\s+"([^"]+)"', version_text)
          firmware_version = match.group(1) if match else "unknown"

          build_time = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          (out / "version.txt").write_text(
              "\n".join(
                  [
                      f"firmware version: {firmware_version}",
                      f"git commit sha: {os.environ.get('GITHUB_SHA', 'unknown')}",
                      f"build date/time: {build_time}",
                      "environments:",
                      "- display",
                      "- sensornode",
                      "",
                  ]
              ),
              encoding="utf-8",
          )
          PY

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: carbtune-firmware-${{ github.sha }}
          path: firmware-artifacts/*

      - name: Upload release firmware assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: firmware-artifacts/*
