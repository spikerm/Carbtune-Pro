name: PlatformIO

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build display firmware
        run: pio run -e display

      - name: Build SensorNode firmware
        run: pio run -e sensornode

      - name: Prepare firmware artifacts
        run: |
          python - <<'PY'
          from datetime import datetime, timezone
          from pathlib import Path
          import os
          import re
          import shutil

          root = Path.cwd()
          out = root / "firmware-artifacts"
          out.mkdir(exist_ok=True)

          artifacts = {
              root / ".pio" / "build" / "display" / "firmware.bin": out / "display-firmware.bin",
              root / ".pio" / "build" / "sensornode" / "firmware.bin": out / "sensornode-firmware.bin",
          }

          for source, target in artifacts.items():
              if not source.exists():
                  raise FileNotFoundError(f"Missing firmware binary: {source}")
              shutil.copyfile(source, target)

          version_text = (root / "Display" / "include" / "version.h").read_text(encoding="utf-8")
          match = re.search(r'#define\s+FW_VERSION\s+"([^"]+)"', version_text)
          firmware_version = match.group(1) if match else "unknown"

          build_time = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          (out / "version.txt").write_text(
              "\n".join(
                  [
                      f"firmware version: {firmware_version}",
                      f"git commit sha: {os.environ.get('GITHUB_SHA', 'unknown')}",
                      f"build date/time: {build_time}",
                      "environments:",
                      "- display",
                      "- sensornode",
                      "",
                  ]
              ),
              encoding="utf-8",
          )
          PY

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: carbtune-firmware-${{ github.sha }}
          path: firmware-artifacts/*

      - name: Upload release firmware assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: firmware-artifacts/*
